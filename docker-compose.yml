services:
  user-service:
    build: ./user-service
    ports:
      - "5001:5000"
    env_file:
      - ./user-service/.env
    environment:
      DATABASE_URL: postgresql://${USER_USER}:${USER_PASSWORD}@user-db:5432/${USER_DB}
    depends_on:
      - user-db

  user-db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${USER_DB}
      POSTGRES_USER: ${USER_USER}
      POSTGRES_PASSWORD: ${USER_PASSWORD}
    volumes:
      - ./user-service/database/init.sql:/docker-entrypoint-initdb.d/init.sql

  housing-service:
    build: ./housing-service
    ports:
      - "5002:5000"
    env_file:
      - ./housing-service/.env
    environment:
      DATABASE_URL: postgresql://${HOUSING_USER}:${HOUSING_PASSWORD}@housing-db:5432/${HOUSING_DB}
    depends_on:
      - housing-db

  housing-db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${HOUSING_DB}
      POSTGRES_USER: ${HOUSING_USER}
      POSTGRES_PASSWORD: ${HOUSING_PASSWORD}
    volumes:
      - ./housing-service/database/init.sql:/docker-entrypoint-initdb.d/init.sql