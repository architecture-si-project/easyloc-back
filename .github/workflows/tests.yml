name: Run Tests

on:
  pull_request:
  push:
    branches:
      - main
      - develop

jobs:
  test-user-service:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          cd user-service
          pip install -r requirements.txt

      - name: Run tests
        run: |
          cd user-service
          python -m pytest

  test-housing-service:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          cd housing-service
          pip install -r requirements.txt

      - name: Run tests
        run: |
          cd housing-service
          python -m pytest